# About Section
# about_title: About Me (Use this to override about section title)
about_profile_image: images/prof_pic.jpg 
about_content: | # this will include new lines to allow paragraphs
  I am a Ph.D. candidate in Astronomy at Yonsei University studying galaxy clusters and dark matter through gravitational lensing. I develop MARS and MrMARTIAN, two lensing mass reconstruction methods. I apply them to strong and weak lensing observations from JWST, HST, and wide field imaging surveys. My work maps mass across a broad range of scales, from dense cluster cores to intracluster filaments. By combining lensing mass reconstruction with multiwavelength observations, I study how massive galaxy clusters assemble and evolve.

# Research overview
research_overview: >-
  My research uses gravitational lensing to map dark matter across a broad range of scales, from galaxy cluster cores to the surrounding cosmic web. I develop lensing mass reconstruction algorithms and apply them to deep and wide-field imaging. I use galaxy distributions, intracluster light, X-ray, and radio observations to interpret the resulting mass maps. These analyses probe cluster mass structure, merger geometry, and the connection between cluster cores and their larger scale environments.

research_themes:
  - title: Merging clusters and dark matter
    description: I use JWST strong and weak lensing observations and HST, X-ray, radio, and intracluster light data to reconstruct mass structure and study merger geometry in systems such as the Bullet Cluster and Abell 2744.
  - title: Cluster outskirts and filamentary structure
    description: I use weak lensing over wide fields to detect and characterize intracluster filaments and to connect cluster mass structure with the surrounding large scale structure. I also develop deep learning tools for mass mapping in future surveys.
  - title: Mass reconstruction methods
    description: I develop MARS and MrMARTIAN, which provide free form and hybrid approaches to cluster lensing mass reconstruction. They use maximum entropy regularization, automatic differentiation, and modern optimization techniques to explore large parameter spaces.

content:
  - title: Featured Publications
    id: research
    layout: text
    content: | # this will include new lines to allow paragraphs
      <article class="featured-publication">
        <h3 class="featured-publication__title">A High-Caliber View of the Bullet Cluster Through JWST Strong and Weak Lensing Analyses</h3>
        <div class="featured-publication__meta">
          <p><em>Published in</em> <strong>The Astrophysical Journal Letters</strong>, <a href="https://iopscience.iop.org/article/10.3847/2041-8213/add2f0" target="_blank" rel="noopener">doi.org/10.3847/2041-8213/add2f0</a></p>
          <p><em>NASA press release</em> · <a href="https://science.nasa.gov/missions/webb/nasa-webb-pierces-bullet-cluster-refines-its-mass/" target="_blank" rel="noopener">View article</a></p>
        </div>
        <div class="featured-publication__body">
          <img src="/assets/Bullet_overlay.jpg" alt="JWST view of the Bullet Cluster" loading="lazy">
          <p>The clear offset between the gravitational lensing mass distribution and the X-ray emitting hot gas in the Bullet Cluster provided direct empirical evidence for the existence of dark matter. Using JWST strong and weak lensing observations, we reconstructed a detailed map of its projected mass distribution and examined the mass structure and merger geometry of the system. Our analysis also revealed a strong morphological similarity between the intracluster light and the lensing mass distribution.</p>
        </div>
      </article>

      <article class="featured-publication featured-publication--reverse">
        <h3 class="featured-publication__title">Precision MARS Mass Reconstruction of A2744: Synergizing the Largest Strong-lensing and Densest Weak-lensing Data Sets from JWST</h3>
        <div class="featured-publication__meta">
          <p><em>Published in</em> <strong>The Astrophysical Journal</strong>, <a href="https://iopscience.iop.org/article/10.3847/1538-4357/ad0cbf" target="_blank" rel="noopener">doi.org/10.3847/1538-4357/ad0cbf</a></p>
        </div>
        <div class="featured-publication__body">
          <img src="/assets/A2744_JWST.jpeg" alt="JWST mass reconstruction of Abell 2744" loading="lazy">
          <p>Abell 2744, also known as Pandora’s Cluster, is a complex merging system containing multiple mass components. Using deep JWST strong and weak lensing observations, we reconstructed a high-resolution map of its projected mass distribution. The map reveals two mass bridges connecting the main mass clumps. With the orientation of observed radio relics, we propose the merger axes of Abell 2744. In a subsequent study (<a href="https://arxiv.org/abs/2604.07445" target="_blank" rel="noopener">link</a>), we found that the directions of intracluster filament candidates around Abell 2744 are broadly consistent with these merger axes.</p>
        </div>
      </article>

