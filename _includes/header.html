<header id="top" class="site-header{% unless page.home %} site-header--compact{% endunless %}">
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <nav class="site-nav no-print" aria-label="Primary navigation">
    <div class="site-nav__inner">
      <a class="site-nav__brand" href="{{ '/' | relative_url }}" aria-label="Sangjun Cha, home">
        Sangjun Cha
      </a>

      <button
        class="site-nav__toggle"
        type="button"
        aria-expanded="false"
        aria-controls="site-menu"
        aria-label="Open navigation menu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div id="site-menu" class="site-nav__menu">
        <a href="{{ '/' | relative_url }}#about"{% if page.home %} aria-current="location"{% endif %}>About</a>
        <a href="{{ '/research/' | relative_url }}"{% if page.url == '/research/' %} aria-current="page"{% endif %}>Research</a>
        <a href="{{ '/publications/' | relative_url }}"{% if page.url == '/publications/' %} aria-current="page"{% endif %}>Publications</a>
        {%- if site.cv_url -%}
          <a href="{{ site.cv_url | relative_url }}" target="_blank" rel="noopener">
            CV <span aria-hidden="true">&#8599;</span>
          </a>
        {%- endif -%}
      </div>
    </div>
  </nav>
</header>
